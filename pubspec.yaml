name: interval_counter
description: "Generated Flutter app from JSON screen specs, based on Interval Counter app on Android."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # UI Icons and fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  
  # Persistent storage
  shared_preferences: ^2.2.2
  
  # State management
  provider: ^6.1.1

  # Utilities
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true